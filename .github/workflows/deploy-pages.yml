name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages for the repository on first run
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # The app is a static site served straight from the repo root
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
