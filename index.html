<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Combat Death Tournament Simulator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22>⚔️</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Combat Death Tournament Simulator</h1>

    <div class="controls">
      <label>
        Mode
        <select id="mode">
          <option value="sim">Simulation</option>
          <option value="game">Game Mode</option>
        </select>
      </label>
      <label>
        Fighters
        <select id="fighter-count">
          <option value="4">4</option>
          <option value="8">8</option>
          <option value="16">16</option>
          <option value="32">32</option>
          <option value="64">64</option>
        </select>
      </label>
      <label>
        Speed
        <select id="speed">
          <option value="1">1x</option>
          <option value="2" selected>2x</option>
          <option value="4">4x</option>
          <option value="8">8x</option>
        </select>
      </label>
      <label id="difficulty-label" hidden>
        Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <label id="watch-label" hidden>
        Watch
        <select id="watch-mode">
          <option value="all">All fights</option>
          <option value="mine">Only my fights</option>
        </select>
      </label>
      <button id="start">Start Tournament</button>
      <span id="downloads" hidden>
        <button id="download-tournament" class="secondary">Download tournament log</button>
        <button id="download-fights" class="secondary">Download fight log</button>
      </span>
    </div>

    <section id="creator" hidden>
      <h2>Create Your Fighter</h2>
      <label class="name-field">
        Name
        <input id="fighter-name" maxlength="24" placeholder="The Chosen One">
      </label>
      <p class="creator-heading">Avatar</p>
      <div id="avatar-grid" class="avatar-grid"></div>
      <p class="creator-heading">Stats — <span id="points-remaining"></span> · <span id="max-health-preview"></span></p>
      <div id="stat-rows" class="stat-rows"></div>
    </section>

    <div class="canvas-wrap">
      <canvas id="arena" width="1000" height="550"></canvas>
      <div id="overlay" class="overlay" hidden></div>
    </div>

    <p id="status">Pick a mode and press Start.</p>
  </main>
  <script type="module" src="src/main.js"></script>
</body>
</html>
